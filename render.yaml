databases:
  - name: gestion-conges-db
    databaseName: gestion_conges
    user: gestion_conges
    plan: free

services:
  - type: web
    name: gestion-conges
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: "Gestion Congés Université"
      - key: APP_ENV
        value: production
      - key: APP_URL
        value: https://gestion-conges-r9q4.onrender.com
      - key: APP_DEBUG
        value: "false"
      - key: APP_LOCALE
        value: fr
      - key: APP_FALLBACK_LOCALE
        value: en
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: info
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: FILESYSTEM_DISK
        value: local
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: gestion-conges-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: gestion-conges-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: gestion-conges-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: gestion-conges-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: gestion-conges-db
          property: password